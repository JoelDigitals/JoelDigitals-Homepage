{% extends "base_home.html" %}
{% load static %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<section class="py-24 text-center px-6">
  <h1 class="text-4xl md:text-6xl font-bold mb-6">{{ title }}</h1>
  {% if subheadline %}
  <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-10">{{ subheadline }}</p>
  {% endif %}

  <div class="prose max-w-3xl mx-auto mb-10">
    {{ content|safe }}
  </div>

  {% if cta_text %}
  <a href="{{ cta_link }}"
     class="inline-block px-8 py-4 bg-primary rounded-xl text-white font-semibold hover:scale-105 transition">
    {{ cta_text }}
  </a>
  {% endif %}
</section>

{% endblock %}
