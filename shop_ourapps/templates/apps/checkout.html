{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="icon" href="{% static 'favicon.png' %}" type="image/png">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(191, 185, 185);
            color: #000;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #0044cc;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo-img {
            width: 250px;
            height: 111px;
            object-fit: contain;
        }

        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
            flex-grow: 1;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            color: #0044cc;
        }

        .form-input {
            margin-bottom: 10px;
        }

        .form-input input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .button {
            background-color: #0044cc;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #0033a0;
        }

        footer {
            background-color: #0044cc;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            margin-top: 50px;
            border-top: 1px solid #ccc;
        }

        footer a {
            color: #ccc;
            margin: 0 5px;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<header>
    <a href="/">
        <img src="{% static 'logo.png' %}" alt="Joel Digitals Logo" class="logo-img">
    </a>
    <nav style="margin-left: auto;">
        <a href="/services/">Services</a>
        <a href="/about/">About Us</a>
        <a href="/contact/">Contact</a>
        <a href="/blog/">Blog</a>
        <a href="/cart/">Cart</a>
    </nav>
</header>

<main>
    <div class="container">
        <h1>Checkout</h1>
        <p>Total: €{{ total }}</p>
        <p>Proceed with payment:</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-input">
                <label for="first_name">First Name</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="form-input">
                <label for="last_name">Last Name</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="form-input">
                <label for="email">Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-input">
                <label for="address">Address, ZipCode, City</label>
                <textarea name="address" required></textarea>
            </div>
            <div class="form-input">
                <label for="company_name">Company Name (optional)</label>
                <input type="text" name="company_name">
            </div>
            <div class="form-input">
                <label for="vat_number">VAT Number (optional)</label>
                <input type="text" name="vat_number">
            </div>
            <div class="form-input">
                <label for="phone">Phone Number</label>
                <input type="text" name="phone">
            </div>
            <div class="form-input">
                <input type="text" name="affiliate_code" placeholder="Affiliate-Code">
                <input type="text" name="discount_code" placeholder="Rabattcode">
            </div>
            <div class="form-input">
                <label for="payment_method">Payment Method</label>
                <select name="payment_method" required>
                    <option value="bank_transfer">Bank Transfer</option>
                    <option value="invoice">Invoice</option>
                </select>
            </div>
            <div>
                <label for="terms">
                    <input type="checkbox" name="terms" required>
                    I agree to the <a href="/terms/">Terms of Service</a>
                </label>
            </div>
            <div>
                <button type="submit" class="button">Complete Order</button>
            </div>
        </form>
        <p>For any questions, please contact us at <a href="mailto:joel-digitals@gmx.de">joel-digitals@gmx.de</a>.</p>
    </div>
</main>

<footer>
    <a>&copy; 2025 Joel Digitals. All rights reserved.</a>
    <p>
        <a href="/imprint/">Imprint</a> |
        <a href="/privacy/">Privacy Policy</a> |
        <a href="/terms/">Terms of Service</a> |
        <a href="/">Home</a>
    </p>
</footer>
</body>
</html>
