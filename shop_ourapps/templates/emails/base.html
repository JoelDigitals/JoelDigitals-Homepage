<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joel Digitals</title>
  <!--[if mso]><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml><![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background-color: #0d0d0d;
      color: #e8e8e8;
      -webkit-font-smoothing: antialiased;
    }

    .email-wrapper {
      background-color: #0d0d0d;
      padding: 40px 16px;
    }

    .email-card {
      max-width: 620px;
      margin: 0 auto;
      background: #141414;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,191,255,0.12);
      box-shadow: 0 0 60px rgba(0,191,255,0.06), 0 20px 60px rgba(0,0,0,0.5);
    }

    /* ─── HEADER ─── */
    .email-header {
      background: linear-gradient(135deg, #0a0a0a 0%, #111827 50%, #0a0a14 100%);
      padding: 40px 40px 32px;
      text-align: center;
      border-bottom: 1px solid rgba(0,191,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .email-header::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,191,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 4px;
    }
    .brand-dot {
      color: #00bfff;
    }
    .brand-tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* ─── LANGUAGE BADGE ─── */
    .lang-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .lang-de { background: rgba(0,191,255,0.12); color: #00bfff; border: 1px solid rgba(0,191,255,0.25); }
    .lang-en { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.12); }

    /* ─── CONTENT SECTIONS ─── */
    .section-de {
      padding: 36px 40px 28px;
    }
    .section-en {
      padding: 28px 40px 36px;
      background: rgba(255,255,255,0.015);
    }

    /* ─── DIVIDER ─── */
    .lang-divider {
      margin: 0 40px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .lang-divider::after {
      content: '🌐';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #141414;
      padding: 0 10px;
      font-size: 13px;
    }

    /* ─── TYPOGRAPHY ─── */
    .greeting {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 14px;
    }
    .body-text {
      font-size: 14px;
      line-height: 1.75;
      color: rgba(255,255,255,0.7);
      margin-bottom: 12px;
    }

    /* ─── INFO BOX ─── */
    .info-box {
      background: rgba(0,191,255,0.06);
      border: 1px solid rgba(0,191,255,0.18);
      border-radius: 10px;
      padding: 16px 20px;
      margin: 18px 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.65);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: rgba(255,255,255,0.4); font-weight: 500; }
    .info-value { color: #ffffff; font-weight: 500; }

    /* ─── CODES TABLE ─── */
    .codes-table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
    }
    .codes-table th {
      background: rgba(0,191,255,0.1);
      color: #00bfff;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .codes-table td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.75);
    }
    .codes-table tr:last-child td { border-bottom: none; }
    .code-value {
      font-family: 'Courier New', monospace;
      background: rgba(0,191,255,0.08);
      color: #00bfff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    /* ─── CTA BUTTON ─── */
    .cta-wrap { text-align: center; margin: 20px 0; }
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #00bfff, #0099d6);
      color: #000000 !important;
      padding: 13px 32px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(0,191,255,0.3);
    }
    .cta-button-outline {
      display: inline-block;
      border: 1.5px solid rgba(0,191,255,0.5);
      color: #00bfff !important;
      padding: 11px 28px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      margin: 4px;
    }

    /* ─── REVIEW SECTION ─── */
    .review-section {
      padding: 28px 40px;
      background: rgba(255,193,7,0.03);
      border-top: 1px solid rgba(255,193,7,0.1);
      border-bottom: 1px solid rgba(255,193,7,0.1);
    }
    .review-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
    }
    .review-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .stars {
      font-size: 22px;
      color: #ffc107;
      letter-spacing: 2px;
      display: block;
      margin-bottom: 14px;
    }
    .review-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .review-btn {
      display: inline-block;
      padding: 9px 16px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.3px;
    }
    .review-btn-primary {
      background: rgba(255,193,7,0.15);
      color: #ffc107;
      border: 1px solid rgba(255,193,7,0.3);
    }
    .review-btn-secondary {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ─── SUGGESTION BOXES ─── */
    .suggestions-wrap { margin: 14px 0; }
    .suggestion-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 10px;
    }
    .suggestion-title {
      font-weight: 600;
      color: #ffffff;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .suggestion-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .suggestion-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .sug-btn {
      display: inline-block;
      background: rgba(0,191,255,0.1);
      color: #00bfff !important;
      border: 1px solid rgba(0,191,255,0.2);
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
    }

    /* ─── FOOTER ─── */
    .email-footer {
      background: #0d0d0d;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer-links { margin-bottom: 12px; }
    .footer-link {
      color: rgba(255,255,255,0.35) !important;
      text-decoration: none;
      font-size: 12px;
      margin: 0 8px;
    }
    .footer-link:hover { color: #00bfff !important; }
    .footer-copy {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      line-height: 1.6;
    }
    .footer-brand {
      color: rgba(0,191,255,0.5);
      font-weight: 600;
    }

    /* ─── SIGNATURE ─── */
    .signature {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 16px;
      line-height: 1.8;
    }
    .sig-name { color: #ffffff; font-weight: 600; }

    @media (max-width: 480px) {
      .section-de, .section-en, .review-section, .email-footer { padding-left: 24px; padding-right: 24px; }
      .lang-divider { margin: 0 24px; }
      .email-header { padding: 28px 24px 22px; }
    }
  </style>
</head>
<body>
<div class="email-wrapper">
  <div class="email-card">

    <!-- HEADER -->
    <div class="email-header">
      <span class="brand-name">Joel Digitals<span class="brand-dot">.</span></span>
      <span class="brand-tagline">Smart. Digital. Reliable.</span>
    </div>

    <!-- CONTENT -->
    {% block content %}{% endblock %}

    <!-- FOOTER -->
    <div class="email-footer">
      <div class="footer-links">
        <a href="https://www.joel-digitals.de" class="footer-link">Website</a>
        <a href="https://www.joel-digitals.de/impressum/" class="footer-link">Impressum</a>
        <a href="https://www.joel-digitals.de/datenschutz/" class="footer-link">Datenschutz</a>
        <a href="https://www.joel-digitals.de/contact" class="footer-link">Support</a>
      </div>
      <p class="footer-copy">
        &copy; 2025–2026 <span class="footer-brand">Joel Digitals</span> · Alle Rechte vorbehalten · All rights reserved<br>
        <a href="https://www.joel-digitals.de" style="color:rgba(0,191,255,0.4);text-decoration:none;font-size:11px;">www.joel-digitals.de</a>
      </p>
    </div>

  </div>
</div>
</body>
</html>
