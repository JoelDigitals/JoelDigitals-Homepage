<article class="border rounded p-4">
  <h2 class="text-xl font-medium">
    <a href="{{ faq.get_absolute_url }}">{{ faq.question }}</a>
  </h2>
  {% if faq.short_answer %}
    <p class="mt-2">{{ faq.short_answer|linebreaksbr }}</p>
  {% else %}
    {# Wenn keine Kurzantwort existiert, zeige einen Auszug der Antwort #}
    <p class="mt-2">{{ faq.answer|striptags|truncatechars:180 }}</p>
  {% endif %}
  <div class="mt-3">
    <a href="{{ faq.get_absolute_url }}" class="text-sm">Mehr erfahren →</a>
  </div>
</article>
