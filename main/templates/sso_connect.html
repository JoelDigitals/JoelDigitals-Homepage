<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mit Joel Digitals verbinden</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }
        .connect-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        .connect-info p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }
        .connect-info strong {
            color: #667eea;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔐 Joel Digitals</h1>
        </div>
        
        <div class="connect-info">
            <p><strong>{{ client.name }}</strong> möchte auf deine Joel Digitals Account-Daten zugreifen.</p>
        </div>
        
        <h2>Anmelden</h2>
        
        <div class="error" id="error-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="deine@email.de" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit">Verbinden</button>
        </form>
        
        <div class="register-link">
            Noch kein Account? <a href="/register/">Jetzt registrieren</a>
        </div>
    </div>

    <script>
        const clientId = "{{ client_id }}";
        const redirectUri = "{{ redirect_uri }}";
        const state = "{{ state }}";
        
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const formData = new FormData(e.target);
            formData.append('client_id', clientId);
            formData.append('redirect_uri', redirectUri);
            formData.append('state', state);
            
            const button = e.target.querySelector('button');
            button.disabled = true;
            button.textContent = 'Verbinde...';
            
            try {
                const response = await fetch('/auth/sso/connect/login/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = data.redirect_url;
                } else {
                    showError(data.error || 'Login fehlgeschlagen');
                    button.disabled = false;
                    button.textContent = 'Verbinden';
                }
            } catch (error) {
                showError('Ein Fehler ist aufgetreten');
                button.disabled = false;
                button.textContent = 'Verbinden';
            }
        });
    </script>
</body>
</html>
