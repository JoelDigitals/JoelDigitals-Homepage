{% extends "base_home.html" %}
{% load static %}

{% block title %}Registrieren – Joel Digitals{% endblock %}

{% block content %}
<style>
    .container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        max-width: 1000px;
        margin: 40px auto;
        font-size: 18px;
        color: #000;
    }

    h2 {
        margin-top: 0;
    }

    a.mail-link {
        color: #0044cc;
        text-decoration: none;
    }

    a.mail-link:hover {
        text-decoration: underline;
    }

    .contact-button {
        background-color: #0044cc;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        font-size: 18px;
        margin-top: 20px;
    }

    .contact-button:hover {
        background-color: #0033a0;
    }
</style>
<main>
    <div class="container">
        <h2>Registrieren</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Registrieren</button>
        </form>
        <p>Schon registriert?
            <a href="{% url 'login' %}">Zum Login</a>
        </p>
    </div>
</main>
{% endblock %}
