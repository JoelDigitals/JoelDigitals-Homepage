<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neue Sales-Anfrage</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding:40px 20px;">

            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden;">

                <!-- Header -->
                <tr>
                    <td style="background:#111827; padding:20px 30px;">
                        <h1 style="margin:0; font-size:20px; color:#ffffff;">
                            Neue Sales-Anfrage
                        </h1>
                    </td>
                </tr>

                <!-- Content -->
                <tr>
                    <td style="padding:30px; color:#111827; font-size:14px; line-height:1.6;">

                        <p style="margin-top:0;">
                            Eine neue Anfrage wurde erstellt.
                        </p>

                        <table width="100%" cellpadding="0" cellspacing="0" style="margin:25px 0;">
                            <tr>
                                <td style="padding:8px 0; width:140px;"><strong>Name:</strong></td>
                                <td style="padding:8px 0;">{{ entry.name }}</td>
                            </tr>
                            <tr>
                                <td style="padding:8px 0;"><strong>E-Mail:</strong></td>
                                <td style="padding:8px 0;">{{ entry.email }}</td>
                            </tr>
                            <tr>
                                <td style="padding:8px 0;"><strong>Betreff:</strong></td>
                                <td style="padding:8px 0;">{{ entry.subject }}</td>
                            </tr>
                        </table>

                        <div style="border:1px solid #e5e7eb; padding:18px; background:#f9fafb; border-radius:6px;">
                            {{ entry.message }}
                        </div>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f1f5f9; padding:15px 30px; font-size:12px; color:#475569;">
                        Joel Digitals · Automatische Benachrichtigung
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
