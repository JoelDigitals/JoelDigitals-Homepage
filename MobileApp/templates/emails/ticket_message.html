<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neue Ticket-Nachricht</title>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 640px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #ffffff;
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
        }
        .content {
            padding: 30px;
            color: #334155;
            line-height: 1.6;
        }
        .content p {
            margin-bottom: 16px;
        }
        .message-box {
            background-color: #f1f5f9;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 6px;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 26px;
            background-color: #3b82f6;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        .footer {
            background-color: #f8fafc;
            padding: 20px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Neue Nachricht im Support-Ticket</h1>
    </div>

    <div class="content">
        <p>
            Hallo,<br><br>
            es gibt eine neue Nachricht zu deinem Support-Ticket
            <strong>#{{ ticket.ticket_number }}</strong>.
        </p>

        <p>
            <strong>Absender:</strong> {{ sender }}
        </p>

        <div class="message-box">
            {{ message }}
        </div>

        <a href="{{ ticket_url }}" class="button">
            Ticket öffnen
        </a>
    </div>

    <div class="footer">
        © {{ now|date:"Y" }} Joel Digitals · Support-System<br>
        Bitte antworte nicht auf diese E-Mail.
    </div>
</div>

</body>
</html>
