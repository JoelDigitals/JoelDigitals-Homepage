{% extends "base_mobile.html" %}
{% load static %}

{% block content %}
<style>
.form-box {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    margin: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.slot {
    padding: 10px;
    margin: 5px 0;
    background: #0044cc;
    color: white;
    border-radius: 5px;
}
</style>

<div class="form-box">

    <h2>Termin vereinbaren</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn" type="submit">Jetzt buchen</button>
    </form>

</div>

{% endblock %}
