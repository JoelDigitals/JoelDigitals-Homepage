{% extends "base_mobile.html" %}
{% load static i18n %}

{% block title %}{% trans "AI Support – Joel Digitals" %}{% endblock %}

{% block extra_css %}
<style>
.chat-header {
  text-align: center;
  padding: 16px 0 20px;
}
.chat-header h1 {
  font-size: 1.4rem;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #8b5cf6, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.chat-header p { color: var(--text-secondary); font-size: 0.85rem; }
.chat-box {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  min-height: 360px;
  max-height: 480px;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}
.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg .label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 4px;
}
.msg.bot .transfer-link {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 16px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.85rem;
}
.input-row {
  display: flex;
  gap: 8px;
}
.input-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}
.input-row input:focus { border-color: #8b5cf6; }
.input-row button {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #8b5cf6, #7c3aed);
  color: #fff;
  font-size: 1.3rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(139,92,246,0.3);
}
.input-row button:active { transform: scale(0.9); }
.input-row button:disabled { opacity: 0.5; }
.status-text {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
  min-height: 1.2em;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}

{% block content %}
<div class="chat-header">
  <h1>{% trans "AI Support" %}</h1>
  <p>{% trans "Ask me anything about Joel Digitals" %}</p>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-row">
  <input type="text" id="chatInput" placeholder="{% trans 'Type your question...' %}" autocomplete="off">
  <button id="sendBtn" title="{% trans 'Send' %}">
    <span class="material-symbols-rounded">send</span>
  </button>
</div>
<div id="statusText" class="status-text"></div>

<script>
(function() {
  var chatBox = document.getElementById('chatBox');
  var chatInput = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var statusText = document.getElementById('statusText');
  var lang = document.documentElement.lang || 'de';
  var isLoading = false;

  function addMessage(role, text, transferHtml) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="label">' + (role === 'user' ? '{% trans "You" %}' : '{% trans "AI" %}') + '</div>' + text;
    if (transferHtml) { div.innerHTML += transferHtml; }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function askAI(text) {
    if (isLoading) return;
    isLoading = true;
    sendBtn.disabled = true;
    addMessage('user', text);
    statusText.textContent = '{% trans "AI is thinking..." %}';

    fetch('{% url "chatbot_api" %}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, lang: lang })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var reply = data.reply || '{% trans "Sorry, I could not answer." %}';
      var transferHtml = '';
      if (data.transfer_to_human || !data.can_help) {
        transferHtml = '<a href="tel:+4915253480270" class="transfer-link">{% trans "Call Support" %} ☎️</a>';
      }
      addMessage('bot', reply, transferHtml);
      statusText.textContent = '';
    })
    .catch(function() {
      addMessage('bot', '{% trans "An error occurred. Please try again." %}');
      statusText.textContent = '';
    })
    .then(function() {
      isLoading = false;
      sendBtn.disabled = false;
      chatInput.focus();
    });
  }

  sendBtn.addEventListener('click', function() {
    var text = chatInput.value.trim();
    if (text) { chatInput.value = ''; askAI(text); }
  });

  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var text = chatInput.value.trim();
      if (text) { chatInput.value = ''; askAI(text); }
    }
  });

  addMessage('bot', '{% trans "Hello! I am your AI assistant. Ask me anything about Joel Digitals services, pricing, or support." %}');
  chatInput.focus();
})();
</script>
{% endblock %}
