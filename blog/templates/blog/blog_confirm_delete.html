{% extends "base_home.html" %}
{% load static %}

{% block title %}Blogeintrag löschen – Joel Digitals{% endblock %}

{% block content %}
<style>
    .container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        margin: 40px auto;
        font-size: 18px;
        color: #000;
    }

    .btn {
        display: inline-block;
        background-color: #0044cc;
        color: white;
        padding: 10px 18px;
        text-decoration: none;
        border-radius: 5px;
        margin-right: 10px;
        transition: background-color 0.3s ease;
    }

    .btn:hover {
        background-color: #0033aa;
    }

    .btn-danger {
        background-color: darkred;
    }

    .btn-danger:hover {
        background-color: #a00000;
    }
</style>

<div class="container">
    <h2>🗑 Blogeintrag löschen</h2>
    <p>Bist du sicher, dass du den Blogeintrag <strong>"{{ post.title }}"</strong> löschen möchtest?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Ja, löschen</button>
        <a href="{% url 'admin_blog' %}" class="btn">Abbrechen</a>
    </form>
</div>
{% endblock %}
