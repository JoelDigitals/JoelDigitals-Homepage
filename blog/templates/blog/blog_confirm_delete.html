{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Blogeintrag löschen – Joel Digitals</title>
    <link rel="icon" href="{% static 'favicon.png' %}" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8e8e8;
            color: #222;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0044cc;
            color: white;
            padding: 10px 20px;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.8em;
        }

        .btn {
            display: inline-block;
            background-color: #0044cc;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 10px;
        }

        .btn:hover {
            background-color: #0033aa;
        }

        .btn-danger {
            background-color: darkred;
        }

        .btn-danger:hover {
            background-color: #a00000;
        }
    </style>
</head>
<body>

<header>
    <h1>Joel Digitals – Blog Verwaltung</h1>
</header>

<main>
    <h2>🗑 Blogeintrag löschen</h2>
    <p>Bist du sicher, dass du den Blogeintrag <strong>"{{ post.title }}"</strong> löschen möchtest?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Ja, löschen</button>
        <a href="{% url 'admin_blog' %}" class="btn">Abbrechen</a>
    </form>
</main>

</body>
</html>
