{% extends "base_home.html" %}
{% load static %}

{% block title %}{{ action }} Kategorie{% endblock %}

{% block content %}
<style>
    .container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        max-width: 600px;
        margin: 40px auto;
        font-size: 18px;
        color: #000;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 30px;
    }

    form p {
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
    }

    input[type="text"],
    input[type="file"],
    select,
    textarea {
        width: 100%;
        padding: 8px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    .btn {
        display: inline-block;
        background-color: #0044cc;
        color: white;
        padding: 10px 18px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-right: 10px;
        text-decoration: none;
        font-size: 16px;
    }

    .btn:hover {
        background-color: #002a80;
    }

    .btn-secondary {
        background-color: #aaa;
        color: white;
    }

    .btn-secondary:hover {
        background-color: #888;
    }
</style>

<div class="container">
    <h2>{{ action }} Kategorie</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">{{ action }}</button>
        <a href="{% url 'list_categories' %}" class="btn btn-secondary">Zurück</a>
    </form>
</div>
{% endblock %}
