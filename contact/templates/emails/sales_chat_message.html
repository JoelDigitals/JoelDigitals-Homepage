<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neue Nachricht im Sales-Chat</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding:40px 20px;">

            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden;">

                <!-- Header -->
                <tr>
                    <td style="background:#111827; padding:20px 30px;">
                        <h1 style="margin:0; font-size:20px; color:#ffffff;">
                            Neue Chat-Nachricht
                        </h1>
                    </td>
                </tr>

                <!-- Content -->
                <tr>
                    <td style="padding:30px; color:#111827; font-size:14px; line-height:1.6;">

                        <p style="margin-top:0;">
                            Es gibt eine neue Nachricht zu folgender Anfrage:
                        </p>

                        <table width="100%" cellpadding="0" cellspacing="0" style="margin:20px 0;">
                            <tr>
                                <td style="padding:6px 0;"><strong>Betreff:</strong></td>
                                <td style="padding:6px 0;">{{ entry.subject }}</td>
                            </tr>
                            <tr>
                                <td style="padding:6px 0;"><strong>Absender:</strong></td>
                                <td style="padding:6px 0;">{{ sender }}</td>
                            </tr>
                        </table>

                        <div style="border-left:4px solid #2563eb; padding:15px; background:#f8fafc; margin:25px 0;">
                            {{ message }}
                        </div>

                        <p style="text-align:center; margin:35px 0;">
                            <a href="{{ chat_url }}"
                               style="background:#2563eb; color:#ffffff; text-decoration:none; padding:12px 22px; border-radius:6px; display:inline-block;">
                                Zum Chat wechseln
                            </a>
                        </p>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f1f5f9; padding:15px 30px; font-size:12px; color:#475569;">
                        Diese E-Mail wurde automatisch versendet.<br>
                        Bitte antworte nicht auf diese Nachricht.
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
