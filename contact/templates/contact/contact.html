{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kontaktformular - Joel Digitals</title>
    <link rel="icon" href="{% static 'favicon.png' %}" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(191, 185, 185);
            color: #000;
            font-size: 18px;
        }

        header {
            background-color: #0044cc;
            color: white;
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .logo-img {
            width: 180px;
            height: auto;
        }

        nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        nav a {
            color: #fff;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
        }

        form label {
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #888;
        }

        .btn {
            background-color: #0044cc;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #1d00d9;
        }

        footer {
            background-color: #0044cc;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            margin-top: 50px;
            color: #ccc;
        }

        footer a {
            color: #ccc;
            text-decoration: none;
            margin: 0 5px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <a href="/"><img src="{% static 'logo.png' %}" alt="Joel Digitals Logo" class="logo-img"></a>
        <nav>
            <a href="/services/">Services</a>
            <a href="/contact/">Contact</a>
            <a href="/blog/">Blog</a>
            <a href="/auth/logout/">Logout</a>
        </nav>
    </header>

    <main>
        <h2>Kontaktformular</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn" type="submit">Senden</button>
        </form>
    </main>

    <footer>
        <div>&copy; 2025 Joel Digitals. All rights reserved.</div>
        <div>
            <a href="/imprint/">Impressum</a> |
            <a href="/privacy/">Datenschutz</a>
        </div>
    </footer>
</body>
</html>
