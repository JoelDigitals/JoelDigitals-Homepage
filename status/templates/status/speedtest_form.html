{% extends "base_home.html" %}
{% load i18n %}
{% block title %}{% trans "Website Speedtest" %} – Joel Digitals{% endblock %}

{% block content %}
<main class="flex justify-center py-12">
  <div class="bg-white dark:bg-gray-900 p-8 rounded-2xl shadow-lg max-w-lg w-full text-center">
    <h1 class="text-3xl font-bold text-blue-600 mb-6">{% trans "Website Speedtest" %}</h1>
    <p class="text-gray-600 dark:text-gray-300 mb-6">
      {% trans "Teste die Erreichbarkeit, Geschwindigkeit und Sicherheit einer beliebigen Website." %}
    </p>
    <form method="get" action="{% url 'speedtest_result' %}" class="space-y-4">
      <input type="url" name="url" placeholder="https://example.com"
             class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
             required>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition">
        {% trans "Test starten" %}
      </button>
    </form>
  </div>
</main>
{% endblock %}
